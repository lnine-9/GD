<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>合同归档</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --color-text-primary:#111;--color-text-secondary:#555;--color-text-tertiary:#999;
  --color-background-primary:#fff;--color-background-secondary:#f5f5f5;
  --color-border-primary:#999;--color-border-secondary:#d0d0d0;--color-border-tertiary:#e5e5e5;
  --border-radius-sm:4px;--border-radius-md:7px;--border-radius-lg:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:#f7f8fa;color:var(--color-text-primary);min-height:100vh}
.page{max-width:1280px;margin:0 auto;padding:2rem 2rem 4rem}

/* ── topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(29,158,117,.25)}
.logo-text{font-size:18px;font-weight:600;color:var(--color-text-primary);letter-spacing:-0.02em}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tb-btn{height:34px;padding:0 14px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;border:1px solid var(--color-border-secondary);background:#fff;color:var(--color-text-secondary);transition:all 0.12s;white-space:nowrap}
.tb-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.tb-btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.tb-btn.primary:hover{opacity:0.88}

/* ── stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.75rem}
.stat{background:#fff;border-radius:var(--border-radius-lg);padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:6px;border:1px solid var(--color-border-tertiary)}
.stat.clickable{cursor:pointer;transition:all 0.12s}
.stat.clickable:hover{border-color:var(--color-border-secondary);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat.clickable.active-filter{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.12)}
.stat-num{font-size:28px;font-weight:600;color:var(--color-text-primary);line-height:1}
.stat-lbl{font-size:12px;color:var(--color-text-secondary)}
.stat-dot{width:7px;height:7px;border-radius:50%;margin-bottom:2px}

/* ── forms ── */
.forms{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.75rem;align-items:start}
.card{background:#fff;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.4rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--color-border-tertiary)}
.card-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.icon-teal{background:#E1F5EE;color:#0F6E56}
.icon-blue{background:#E6F1FB;color:#185FA5}
.card-title{font-size:14px;font-weight:600;color:var(--color-text-primary)}

.field{margin-bottom:12px}
.field:last-of-type{margin-bottom:0}
.field label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:5px;letter-spacing:0.03em;font-weight:500;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:#fff;color:var(--color-text-primary);outline:none;transition:border-color 0.15s,box-shadow 0.15s;font-family:var(--font-sans)}
.field input{height:36px;padding:0 11px}
.field textarea{height:60px;padding:9px 11px;resize:none;line-height:1.5}
.field select{height:36px;padding:0 11px;cursor:pointer}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.field input[type="date"]{font-size:12px;color:var(--color-text-secondary)}

.type-group{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.type-btn{height:34px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;font-weight:500;color:var(--color-text-secondary);background:#fff;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;justify-content:center;gap:5px}
.type-btn:hover{border-color:#aaa;color:var(--color-text-primary)}
.type-btn.sel-sub{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.type-btn.sel-acc{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.type-btn.sel-prj{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}

.submit-btn{width:100%;height:36px;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.15s,transform 0.1s;margin-top:14px;letter-spacing:0.01em}
.submit-btn:active{transform:scale(0.98);opacity:0.85}
.btn-teal{background:#1D9E75;color:#fff;box-shadow:0 2px 6px rgba(29,158,117,.2)}
.btn-blue{background:#378ADD;color:#fff;box-shadow:0 2px 6px rgba(55,138,221,.2)}

/* ── mode tabs ── */
.mode-tabs{display:flex;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;margin-bottom:14px;background:var(--color-background-secondary)}
.mode-tab{flex:1;height:34px;border:none;background:none;font-size:12px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;gap:5px}
.mode-tab+.mode-tab{border-left:1px solid var(--color-border-secondary)}
.mode-tab.active{background:#fff;color:var(--color-text-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary)}
.mode-panel{display:none}
.mode-panel.active{display:block}

/* ── pending list ── */
.pending-search-wrap{position:relative;margin-bottom:8px}
.pending-search-wrap i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--color-text-tertiary);pointer-events:none}
.pending-search-wrap input{width:100%;height:32px;padding:0 10px 0 30px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:#fff;color:var(--color-text-primary);outline:none}
.pending-search-wrap input:focus{border-color:#1D9E75}
.pending-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;margin-bottom:10px;padding-right:2px}
.pending-list::-webkit-scrollbar{width:4px}
.pending-list::-webkit-scrollbar-track{background:transparent}
.pending-list::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px}
.pending-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;transition:all 0.12s;background:#fff}
.pending-item:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.pending-item.selected{border-color:#378ADD;background:#EEF5FD}
.pi-left{flex:1;min-width:0}
.pi-no{font-size:13px;font-weight:600;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-summary{font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.pi-date{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0}
.no-pending{text-align:center;padding:1.5rem 0;color:var(--color-text-tertiary);font-size:13px}
.no-pending i{display:block;font-size:26px;margin-bottom:6px;opacity:0.35}
.selected-hint{display:none;align-items:center;gap:8px;padding:9px 12px;background:#EEF5FD;border:1px solid #C5DCFA;border-radius:var(--border-radius-md);margin-bottom:12px;font-size:12px;color:#0C447C;line-height:1.4}
.selected-hint.visible{display:flex}
.selected-hint .sel-info{flex:1;min-width:0}
.selected-hint .sel-no{font-weight:600;font-size:13px}
.selected-hint .sel-sum{opacity:.8;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clear-sel{flex-shrink:0;cursor:pointer;color:#185FA5;font-size:12px;background:none;border:1px solid #C5DCFA;border-radius:5px;padding:2px 8px;display:flex;align-items:center;gap:3px;transition:background .1s}
.clear-sel:hover{background:#deedfb}
.reimb-wrap{display:none}
.reimb-wrap.visible{display:block}
.match-preview{display:none;padding:10px 12px;background:#f8f9fa;border-radius:var(--border-radius-md);margin-bottom:10px;font-size:12px;color:var(--color-text-secondary);line-height:1.7;border:1px solid var(--color-border-secondary)}
.match-preview.visible{display:block}
.match-preview strong{color:var(--color-text-primary);font-weight:600}
.manual-hint{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;line-height:1.6;display:flex;gap:5px}
.manual-hint i{font-size:13px;flex-shrink:0;margin-top:1px}

/* ── toolbar ── */
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.srch{flex:1;min-width:180px;position:relative}
.srch i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--color-text-tertiary);pointer-events:none}
.srch input{width:100%;height:34px;padding:0 10px 0 32px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:#fff;color:var(--color-text-primary);outline:none}
.srch input:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.08)}
.seg{display:flex;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;background:var(--color-background-secondary)}
.seg-btn{height:34px;padding:0 11px;border:none;background:none;font-size:12px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:all 0.1s;white-space:nowrap}
.seg-btn.active{background:#fff;color:var(--color-text-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary)}
.seg-btn+.seg-btn{border-left:1px solid var(--color-border-tertiary)}
.adv-select{height:34px;padding:0 10px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:#fff;color:var(--color-text-secondary);outline:none;cursor:pointer}
.adv-date{height:34px;padding:0 10px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;background:#fff;color:var(--color-text-secondary);outline:none}

/* ── table ── */
.tw{background:#fff;border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead{background:#fafafa}
th{padding:10px 14px;text-align:left;font-weight:600;font-size:11px;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border-tertiary);letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
th.c{text-align:center}
td{padding:11px 14px;border-bottom:1px solid var(--color-border-tertiary);color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
td.wrap{white-space:normal;word-break:break-word;line-height:1.6;font-size:12px;color:var(--color-text-secondary)}
tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.08s}
tbody tr:hover td{background:#f9fbff}
td.c{text-align:center}
td.num{color:var(--color-text-tertiary);font-size:12px;text-align:center;font-weight:500}
td.ts{font-size:12px;color:var(--color-text-secondary)}
td.amount{font-size:12px;font-weight:500;font-variant-numeric:tabular-nums}

.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.01em}
.pill-done{background:#E1F5EE;color:#085041}
.pill-wait{background:#FEF3E2;color:#7A3D02}
.pill-new{background:#E6F1FB;color:#0C447C;font-size:10px}
.tag-sub{background:#E1F5EE;color:#085041}
.tag-acc{background:#FEF3E2;color:#7A3D02}
.tag-prj{background:#EEEDFE;color:#26215C}

.act-btn{border:none;cursor:pointer;font-size:12px;font-weight:500;padding:3px 10px;border-radius:5px;transition:all 0.1s;display:inline-flex;vertical-align:middle;font-family:var(--font-sans)}
.edit-btn{background:#F0F4FF;color:#2563EB;border:1px solid #C7D7FD}
.edit-btn:hover{background:#DBEAFE;color:#1D4ED8}
.del-btn{background:#FFF0F0;color:#D93025;border:1px solid #FEC9C7;margin-left:4px}
.del-btn:hover{background:#FDECEA;color:#B91C1C}

.empty{padding:3.5rem 0;text-align:center;color:var(--color-text-tertiary);font-size:13px}
.empty i{font-size:32px;display:block;margin-bottom:10px;opacity:0.4}
.empty p{margin-top:4px;font-size:12px;opacity:.7}

/* ── MODAL – full redesign ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;width:560px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;gap:12px;padding:20px 24px 16px;border-bottom:1px solid var(--color-border-tertiary);flex-shrink:0}
.modal-header-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.modal-header-icon.teal{background:#E1F5EE;color:#0F6E56}
.modal-header-icon.red{background:#FDECEA;color:#D93025}
.modal-title{font-size:16px;font-weight:700;color:var(--color-text-primary);flex:1}
.modal-close{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:20px;display:flex;padding:4px;border-radius:6px;transition:color .1s,background .1s}
.modal-close:hover{color:var(--color-text-primary);background:var(--color-background-secondary)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-track{background:transparent}
.modal-body::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:3px}
.modal-footer{padding:14px 24px 20px;border-top:1px solid var(--color-border-tertiary);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.modal-btn{height:36px;padding:0 20px;border-radius:var(--border-radius-md);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--color-border-secondary);background:#fff;color:var(--color-text-primary);transition:all .1s}
.modal-btn:hover{background:var(--color-background-secondary)}
.modal-btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75;box-shadow:0 2px 6px rgba(29,158,117,.2)}
.modal-btn.primary:hover{opacity:.88}
.modal-btn.danger{background:#D93025;color:#fff;border-color:#D93025;box-shadow:0 2px 6px rgba(217,48,37,.2)}
.modal-btn.danger:hover{opacity:.88}

/* modal field styles */
.mfield{margin-bottom:14px}
.mfield:last-child{margin-bottom:0}
.mfield label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:6px;letter-spacing:0.04em;font-weight:600;text-transform:uppercase}
.mfield input,.mfield textarea,.mfield select{width:100%;padding:0 11px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:#fff;color:var(--color-text-primary);outline:none;transition:border-color 0.15s,box-shadow 0.15s;height:36px;font-family:var(--font-sans)}
.mfield textarea{height:68px;padding:9px 11px;resize:none;line-height:1.5}
.mfield input[type="date"]{font-size:12px;color:var(--color-text-secondary)}
.mfield input:focus,.mfield textarea:focus,.mfield select:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.mfield-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-section{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--color-border-tertiary)}
.modal-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.modal-section-title{font-size:11px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.modal-section-title i{font-size:13px}

/* del modal */
.del-modal-body{padding:8px 0 4px}
.del-modal-body .contract-name{font-size:16px;font-weight:700;color:var(--color-text-primary);margin-bottom:8px}
.del-modal-body .warn-text{font-size:13px;color:var(--color-text-secondary);line-height:1.6}
.del-modal-body .warn-note{font-size:12px;color:#D93025;margin-top:10px;display:flex;align-items:center;gap:5px}

/* toast */

/* ── batch select ── */
.cb-col{width:38px;text-align:center}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#1D9E75}
.batch-bar{display:none;align-items:center;gap:10px;padding:8px 14px;background:#FFF7ED;border:1px solid #FDE68A;border-radius:var(--border-radius-md);margin-bottom:10px;font-size:13px;color:#92400E}
.batch-bar.show{display:flex}
.batch-bar strong{color:#D97706}
.batch-del-btn{height:30px;padding:0 14px;background:#D93025;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .1s;margin-left:auto}
.batch-del-btn:hover{opacity:.85}
.batch-cancel-btn{height:30px;padding:0 12px;background:#fff;color:var(--color-text-secondary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer}
.batch-cancel-btn:hover{background:var(--color-background-secondary)}
tr.row-checked td{background:#FFF9F0 !important}

.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none}
.toast{background:#1a1a1a;border-radius:8px;padding:9px 18px;font-size:13px;color:#fff;opacity:0;transform:translateY(12px);transition:opacity .22s,transform .22s;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div class="page">

<!-- topbar -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📁</div>
    <span class="logo-text">合同归档</span>
  </div>
  <div class="topbar-actions">
    <input type="file" id="excelImport" accept=".csv,.xlsx" style="display:none" />
    <button class="tb-btn" id="tplBtn">⬇ 下载导入模板</button>
    <button class="tb-btn" id="importBtn">📥 导入 Excel</button>
    <button class="tb-btn" id="backupBtn">💾 备份 JSON</button>
    <button class="tb-btn primary" id="exportBtn">⬇ 导出 CSV</button>
  </div>
</div>

<!-- stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-dot" style="background:#1D9E75"></div>
    <div class="stat-num" id="st-total">0</div>
    <div class="stat-lbl">全部合同</div>
  </div>
  <div class="stat clickable" id="stat-pend" onclick="setFilter('pend')">
    <div class="stat-dot" style="background:#EF9F27"></div>
    <div class="stat-num" id="st-pending">0</div>
    <div class="stat-lbl">待报账 ↗</div>
  </div>
  <div class="stat clickable" id="stat-done" onclick="setFilter('done')">
    <div class="stat-dot" style="background:#378ADD"></div>
    <div class="stat-num" id="st-done">0</div>
    <div class="stat-lbl">已完成 ↗</div>
  </div>
  <div class="stat clickable" id="stat-today" onclick="setFilter('today')">
    <div class="stat-dot" style="background:#AFA9EC"></div>
    <div class="stat-num" id="st-today">0</div>
    <div class="stat-lbl">今日新增 ↗</div>
  </div>
</div>

<!-- forms -->
<div class="forms">
  <!-- 盖章登记 -->
  <div class="card">
    <div class="card-head">
      <div class="card-icon icon-teal">🖊</div>
      <span class="card-title">盖章登记</span>
    </div>
    <div class="field"><label>合同编号</label><input id="s_contract" placeholder="HT-2026-001" autocomplete="off"/></div>
    <div class="field"><label>盖章编号</label><input id="s_stamp" placeholder="GZ-2026-001" autocomplete="off"/></div>
    <div class="field"><label>合同摘要</label><textarea id="s_summary" placeholder="简要描述合同内容、甲乙方、金额等…"></textarea></div>
    <div class="field"><label>合同金额（元）</label><input id="s_amount" type="number" placeholder="例：50000" min="0"/></div>

<script>
const KEY='contract_archive_v2';
let selIds=new Set();
let records=[],filterMode='all',selType='',selEditType='',selContractId=null,editId=null,delId=null;

function generateContractNo(){
  const d=new Date(),pad=n=>String(n).padStart(2,'0');
  const prefix=`ZQR${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const todayRecs=records.filter(r=>(r.contractNo||'').startsWith(prefix));
  let max=0;todayRecs.forEach(r=>{const n=parseInt((r.contractNo||'').slice(-2));if(!isNaN(n)&&n>max)max=n;});
  return prefix+String(max+1).padStart(2,'0');
}
function fillAutoContractNo(){const inp=document.getElementById('s_contract');if(!inp.value.trim())inp.value=generateContractNo();}

function nowLocal(){const d=new Date(),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function resetPickers(){['s_time','r_time','m_time'].forEach(id=>{document.getElementById(id).value=nowLocal();});}

function fmtAmt(v){if(!v&&v!==0)return'';const n=parseFloat(v);if(isNaN(n))return v;return n.toLocaleString('zh-CN');}

window.selectType=function(btn,cls){
  document.querySelectorAll('.card:first-child .type-btn').forEach(b=>b.className='type-btn');
  if(selType===btn.dataset.type){selType='';return;}
  btn.classList.add(cls);selType=btn.dataset.type;
};
window.selectEditType=function(btn,cls){
  document.querySelectorAll('#editModal .type-btn').forEach(b=>b.className='type-btn');
  if(selEditType===btn.dataset.type){selEditType='';return;}
  btn.classList.add(cls);selEditType=btn.dataset.type;
};
window.switchMode=function(mode){
  ['pick','manual'].forEach(m=>{
    document.getElementById('tab-'+m).classList.toggle('active',m===mode);
    document.getElementById('panel-'+m).classList.toggle('active',m===mode);
  });
};
window.setFilter=function(f){
  filterMode=f;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  ['pend','done','today'].forEach(x=>document.getElementById('stat-'+x).classList.toggle('active-filter',x===f));
  render();
};

function load(){try{const s=localStorage.getItem(KEY);if(s)records=JSON.parse(s);}catch(e){records=[];}resetPickers();render();setTimeout(fillAutoContractNo,100);}
function save(){try{localStorage.setItem(KEY,JSON.stringify(records));}catch(e){}}

function fmt(iso){if(!iso)return'';const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function localToISO(s){return s?new Date(s).toISOString():'';}
function isoToLocal(iso){if(!iso)return'';const d=new Date(iso),p=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function isToday(iso){if(!iso)return false;const d=new Date(iso),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function typePill(type,small){if(!type)return'<span style="color:var(--color-text-tertiary)">—</span>';const map={分包:'tag-sub',走账:'tag-acc',项目:'tag-prj'};return`<span class="pill ${map[type]||''}" style="${small?'font-size:10px;padding:1px 6px':''}">` +type+`</span>`;}

// pending list
window.selectPending=function(id){
  selContractId=id;
  const rec=records.find(r=>r.id===id);
  if(rec){
    document.getElementById('selectedNo').textContent=rec.contractNo;
    document.getElementById('selectedSum').textContent=rec.summary?rec.summary.slice(0,30)+(rec.summary.length>30?'…':''):'';
    document.getElementById('selectedHint').classList.add('visible');
    document.getElementById('reimbWrap').classList.add('visible');
    document.getElementById('r_time').value=nowLocal();
    document.getElementById('r_reimb').focus();
  }
  renderPendingList();
};
document.getElementById('clearSel').addEventListener('click',()=>{
  selContractId=null;
  document.getElementById('selectedHint').classList.remove('visible');
  document.getElementById('reimbWrap').classList.remove('visible');
  document.getElementById('r_reimb').value='';
  renderPendingList();
});

document.getElementById('m_contract').addEventListener('input',function(){
  const val=this.value.trim(),pv=document.getElementById('matchPreview');
  const rec=records.find(r=>r.contractNo===val);
  if(rec&&val){
    let badge=rec.reimbNo?'<span style="color:#D93025;font-weight:700">⚠ 已完成报账</span>':rec.stampNo?'<span style="color:#1D9E75;font-weight:700">✓ 可关联此记录</span>':'<span style="color:#EF9F27;font-weight:700">△ 仅有基础记录</span>';
    let html=`<strong>已匹配合同</strong> &nbsp;${badge}`;
    if(rec.type)html+=`<br>类型：${rec.type}`;
    if(rec.stampNo)html+=`<br>盖章编号：${rec.stampNo}`;
    if(rec.summary)html+=`<br>摘要：${rec.summary.slice(0,40)}`;
    if(rec.reimbNo)html+=`<br>报账编号：${rec.reimbNo}`;
    pv.innerHTML=html;pv.classList.add('visible');
  }else{pv.classList.remove('visible');}
});

function renderPendingList(){
  const kw=(document.getElementById('pendingSearch')?.value||'').trim().toLowerCase();
  const pending=records.filter(r=>r.stampNo&&!r.reimbNo&&(!kw||(r.contractNo||'').toLowerCase().includes(kw)));
  const pl=document.getElementById('pendingList');
  if(!pending.length){pl.innerHTML='<div class="no-pending">✓ 暂无待报账合同</div>';return;}
  pl.innerHTML=pending.map(r=>`<div class="pending-item${r.id===selContractId?' selected':''}" onclick="selectPending('${r.id}')">
    <div class="pi-left">
      <div class="pi-no">${r.contractNo}</div>
      ${r.summary?`<div class="pi-summary">${r.summary.slice(0,32)}${r.summary.length>32?'…':''}</div>`:''}
    </div>
    ${typePill(r.type,true)}
    <div class="pi-date" style="margin-left:6px">${fmtShort(r.stampTime)}</div>
  </div>`).join('');
  document.getElementById('reimb-suggest').innerHTML=[...new Set(records.filter(r=>r.reimbNo).map(r=>r.reimbNo))].map(v=>`<option value="${v}">`).join('');
  document.getElementById('all-contracts').innerHTML=records.map(r=>`<option value="${r.contractNo}">`).join('');
}

function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  document.getElementById('st-total').textContent=records.length;
  document.getElementById('st-pending').textContent=records.filter(r=>!r.reimbNo).length;
  document.getElementById('st-done').textContent=records.filter(r=>r.reimbNo).length;
  document.getElementById('st-today').textContent=records.filter(r=>isToday(r.stampTime)||isToday(r.reimbTime)).length;
  renderPendingList();
  const advDate=document.getElementById('advDate')?.value||'';
  const advStatus=document.getElementById('advStatus')?.value||'';
  let list=records.slice();
  if(filterMode==='pend')list=list.filter(r=>!r.reimbNo);
  else if(filterMode==='done')list=list.filter(r=>r.reimbNo);
  else if(filterMode==='today')list=list.filter(r=>isToday(r.stampTime)||isToday(r.reimbTime));
  else if(['分包','走账','项目'].includes(filterMode))list=list.filter(r=>r.type===filterMode);
  if(q)list=list.filter(r=>[r.contractNo,r.stampNo,r.reimbNo,r.type,r.summary].some(v=>(v||'').toLowerCase().includes(q)));
  if(advDate)list=list.filter(r=>(r.stampTime||'').slice(0,10)===advDate||(r.reimbTime||'').slice(0,10)===advDate);
  if(advStatus==='done')list=list.filter(r=>r.reimbNo);
  if(advStatus==='pend')list=list.filter(r=>!r.reimbNo);
  const tb=document.getElementById('tbody');
  if(!list.length){tb.innerHTML=`<tr><td colspan="11"><div class="empty">📭 <p>${q||filterMode!=='all'||advDate||advStatus?'没有匹配的记录':'暂无归档记录，请从上方登记'}</p></div></td></tr>`;return;}
  tb.innerHTML=list.slice().reverse().map((r,i)=>{
    const done=!!r.reimbNo;
    const status=done?'<span class="pill pill-done">已完成</span>':'<span class="pill pill-wait">待报账</span>';
    const nb=(isToday(r.stampTime)||isToday(r.reimbTime))?'<span class="pill pill-new" style="margin-left:3px">新</span>':'';
    const summary=r.summary?`<span title="${r.summary.replace(/"/g,'&quot;')}">${r.summary}</span>`:'<span style="color:var(--color-text-tertiary)">—</span>';
    const amt=r.amount?`<span style="color:#1D9E75">${fmtAmt(r.amount)}</span>`:'<span style="color:var(--color-text-tertiary)">—</span>';
    return`<tr class="${selIds.has(r.id)?'row-checked':''}" onclick="rowClick(event,'${r.id}')">
      <td class="cb-col" onclick="event.stopPropagation()"><input type="checkbox" class="row-cb" data-id="${r.id}" ${selIds.has(r.id)?'checked':''} onchange="toggleRow(this)" /></td>
      <td class="num">${list.length-i}</td>
      <td title="${r.contractNo}" style="font-weight:500">${r.contractNo}${nb}</td>
      <td class="wrap">${summary}</td>
      <td class="amount">${amt}</td>
      <td>${r.stampNo||'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td class="ts">${fmt(r.stampTime)||'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td>${r.reimbNo||'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td class="ts">${fmt(r.reimbTime)||'<span style="color:var(--color-text-tertiary)">—</span>'}</td>
      <td class="c">${typePill(r.type)}</td>
      <td class="c">${status}</td>
      <td class="c" style="white-space:nowrap">
        <button class="act-btn edit-btn" onclick="openEdit('${r.id}')">编辑</button>
      </td>
    </tr>`;
  }).join('');
  updateBatchBar();
}

// add stamp
document.getElementById('addStamp').addEventListener('click',()=>{
  const cNo=document.getElementById('s_contract').value.trim();
  const sNo=document.getElementById('s_stamp').value.trim();
  if(!cNo||!sNo){toast('请填写合同编号和盖章编号');return;}
  if(records.find(r=>r.contractNo===cNo)){toast('该合同编号已存在');return;}
  if(records.find(r=>r.stampNo===sNo)){toast('该盖章编号已存在');return;}
  records.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),contractNo:cNo,stampNo:sNo,amount:document.getElementById('s_amount').value.trim(),summary:document.getElementById('s_summary').value.trim(),stampTime:localToISO(document.getElementById('s_time').value)||new Date().toISOString(),type:selType,reimbNo:'',reimbTime:''});
  save();render();
  ['s_contract','s_stamp','s_summary','s_amount'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('s_time').value=nowLocal();
  document.querySelectorAll('.card:first-child .type-btn').forEach(b=>b.className='type-btn');
  selType='';fillAutoContractNo();document.getElementById('s_contract').focus();
  toast('✓ 盖章登记成功');
});

// add reimb pick
document.getElementById('addReim').addEventListener('click',()=>{
  if(!selContractId){toast('请先选择一条待报账合同');return;}
  const rNo=document.getElementById('r_reimb').value.trim();
  if(!rNo){toast('请填写报账编号');return;}
  if(records.find(r=>r.reimbNo===rNo)){toast('该报账编号已存在');return;}
  const rec=records.find(r=>r.id===selContractId);
  if(!rec||rec.reimbNo){toast('该合同已登记报账');return;}
  rec.reimbNo=rNo;rec.reimbTime=localToISO(document.getElementById('r_time').value)||new Date().toISOString();
  selContractId=null;save();render();
  document.getElementById('r_reimb').value='';
  document.getElementById('selectedHint').classList.remove('visible');
  document.getElementById('reimbWrap').classList.remove('visible');
  toast('✓ 报账登记完成');
});

// add reimb manual
document.getElementById('addManualReim').addEventListener('click',()=>{
  const cNo=document.getElementById('m_contract').value.trim();
  const rNo=document.getElementById('m_reimb').value.trim();
  if(!cNo||!rNo){toast('请填写合同编号和报账编号');return;}
  if(records.find(r=>r.reimbNo===rNo)){toast('该报账编号已存在');return;}
  const reimbTime=localToISO(document.getElementById('m_time').value)||new Date().toISOString();
  const ex=records.find(r=>r.contractNo===cNo);
  if(ex){
    if(ex.reimbNo){toast('该合同已登记报账编号');return;}
    ex.reimbNo=rNo;ex.reimbTime=reimbTime;
    toast('✓ 已关联盖章记录，报账登记完成');
  }else{
    records.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),contractNo:cNo,stampNo:'',summary:'',amount:'',stampTime:'',type:'',reimbNo:rNo,reimbTime});
    toast('✓ 报账登记成功（无盖章记录）');
  }
  save();render();
  document.getElementById('m_contract').value='';document.getElementById('m_reimb').value='';
  document.getElementById('m_time').value=nowLocal();
  document.getElementById('matchPreview').classList.remove('visible');
});

// edit
window.openEdit=function(id){
  editId=id;const r=records.find(x=>x.id===id);if(!r)return;
  document.getElementById('e_contract').value=r.contractNo||'';
  document.getElementById('e_stamp').value=r.stampNo||'';
  document.getElementById('e_reimb').value=r.reimbNo||'';
  document.getElementById('e_summary').value=r.summary||'';
  document.getElementById('e_amount').value=r.amount||'';
  document.getElementById('e_stampTime').value=isoToLocal(r.stampTime);
  document.getElementById('e_reimbTime').value=isoToLocal(r.reimbTime);
  selEditType=r.type||'';
  const cls={分包:'sel-sub',走账:'sel-acc',项目:'sel-prj'};
  document.querySelectorAll('#editModal .type-btn').forEach(b=>{b.className='type-btn';if(b.dataset.type===selEditType&&cls[selEditType])b.classList.add(cls[selEditType]);});
  document.getElementById('editModal').classList.add('show');
};
window.closeModal=function(){document.getElementById('editModal').classList.remove('show');editId=null;};
window.saveEdit=function(){
  const r=records.find(x=>x.id===editId);if(!r)return;
  const newC=document.getElementById('e_contract').value.trim();
  if(!newC){toast('合同编号不能为空');return;}
  if(records.find(x=>x.id!==editId&&x.contractNo===newC)){toast('合同编号与其他记录重复');return;}
  r.contractNo=newC;r.stampNo=document.getElementById('e_stamp').value.trim();
  r.reimbNo=document.getElementById('e_reimb').value.trim();
  r.summary=document.getElementById('e_summary').value.trim();
  r.amount=document.getElementById('e_amount').value.trim();
  r.type=selEditType;
  r.stampTime=localToISO(document.getElementById('e_stampTime').value);
  r.reimbTime=localToISO(document.getElementById('e_reimbTime').value);
  if(r.stampNo&&!r.stampTime)r.stampTime=new Date().toISOString();
  if(!r.stampNo)r.stampTime='';
  if(r.reimbNo&&!r.reimbTime)r.reimbTime=new Date().toISOString();
  if(!r.reimbNo)r.reimbTime='';
  save();render();closeModal();toast('✓ 修改已保存');
};

// delete
window.openDel=function(id){
  delId=id;const r=records.find(x=>x.id===id);
  document.getElementById('delContractName').textContent=r?.contractNo||'';
  document.getElementById('delModalBody').textContent=`该记录包含${r?.stampNo?'盖章编号 '+r.stampNo:''}${r?.reimbNo?(r?.stampNo?' 和 ':'')+'报账编号 '+r.reimbNo:''}等信息，删除后将无法恢复。`;
  document.getElementById('delModal').classList.add('show');
};
window.closeDelModal=function(){document.getElementById('delModal').classList.remove('show');delId=null;};
window.delFromEdit=function(){
  if(!editId)return;
  // 先关编辑窗，再打开删除确认
  const id=editId;
  closeModal();
  openDel(id);
};
window.confirmDel=function(){
  if(selContractId===delId){selContractId=null;document.getElementById('selectedHint').classList.remove('visible');document.getElementById('reimbWrap').classList.remove('visible');}
  records=records.filter(r=>r.id!==delId);save();render();closeDelModal();toast('记录已删除');
};

// keyboard
['s_contract','s_stamp'].forEach((id,i,arr)=>{document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter'&&i<arr.length-1)document.getElementById(arr[i+1]).focus();});});
document.getElementById('r_reimb').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addReim').click();});
document.getElementById('m_reimb').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('addManualReim').click();});
document.getElementById('q').addEventListener('input',()=>{filterMode='all';document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));render();});
document.getElementById('pendingSearch')?.addEventListener('input',renderPendingList);
document.getElementById('advDate')?.addEventListener('input',render);
document.getElementById('advStatus')?.addEventListener('change',render);
document.querySelectorAll('.seg-btn').forEach(btn=>{btn.addEventListener('click',function(){
  filterMode=this.dataset.f;
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b===this));
  ['pend','done','today'].forEach(f=>document.getElementById('stat-'+f)?.classList.remove('active-filter'));
  render();
});});

// template download
document.getElementById('tplBtn').addEventListener('click',()=>{
  const headers=['合同编号','合同摘要','合同金额','盖章编号','盖章日期','报账编号','报账日期','合同类型'];
  const examples=[
    ['HT-2026-001','XX公司劳务分包合同，含人工费及材料费','150000','GZ-2026-001','2026-01-10','BZ-2026-001','2026-02-05','分包'],
    ['HT-2026-002','某项目设备采购走账协议','80000','GZ-2026-002','2026-01-15','','','走账'],
    ['HT-2026-003','年度维保服务合同','50000','GZ-2026-003','2026-01-20','','','项目'],
  ];
  const wb=XLSX.utils.book_new();
  const wsData=[headers,...examples];
  const ws=XLSX.utils.aoa_to_sheet(wsData);

  // 列宽
  ws['!cols']=[
    {wch:18},{wch:36},{wch:14},{wch:18},{wch:14},{wch:18},{wch:14},{wch:10}
  ];

  // 标注说明行（在数据下方空一行）
  const noteRow=wsData.length+2;
  XLSX.utils.sheet_add_aoa(ws,[
    ['【填写说明】'],
    ['· 合同编号：必填，不可与已有记录重复'],
    ['· 盖章日期 / 报账日期：格式 YYYY-MM-DD，如 2026-01-10'],
    ['· 合同类型：填 分包 / 走账 / 项目 之一，或留空'],
    ['· 报账编号 / 报账日期：如未报账可留空'],
    ['· 导入时已存在的合同编号会自动跳过'],
  ],{origin:{r:noteRow,c:0}});

  XLSX.utils.book_append_sheet(wb,ws,'合同归档导入模板');
  XLSX.writeFile(wb,`合同归档导入模板_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('✓ 模板已下载');
});

// backup
document.getElementById('backupBtn').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(records,null,2)],{type:'application/json'}));
  a.download=`合同备份_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('JSON 备份已导出');
});

// export CSV
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(!records.length){toast('暂无数据');return;}
  const rows=[['序号','合同编号','合同摘要','合同金额','盖章编号','盖章日期','报账编号','报账日期','合同类型','状态']];
  records.forEach((r,i)=>rows.push([i+1,r.contractNo,r.summary||'',r.amount||'',r.stampNo||'—',fmt(r.stampTime)||'—',r.reimbNo||'待报账',r.reimbTime?fmt(r.reimbTime):'—',r.type||'—',r.reimbNo?'已完成':'待报账']));
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`合同归档_${new Date().toISOString().slice(0,10)}.csv`;a.click();toast('CSV 已导出');
});

// import Excel
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('excelImport').click());
document.getElementById('excelImport').addEventListener('change',async function(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data);
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    let ok=0;
    rows.forEach(row=>{
      const cNo=String(row['合同编号']||'').trim();if(!cNo||records.find(r=>r.contractNo===cNo))return;
      records.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),contractNo:cNo,stampNo:String(row['盖章编号']||'').trim(),summary:String(row['合同摘要']||'').trim(),amount:String(row['合同金额']||'').trim(),stampTime:row['盖章日期']?new Date(row['盖章日期']).toISOString():'',reimbNo:String(row['报账编号']||'').trim(),reimbTime:row['报账日期']?new Date(row['报账日期']).toISOString():'',type:String(row['合同类型']||'').trim()});
      ok++;
    });
    save();render();toast(`成功导入 ${ok} 条记录`);
  }catch(err){toast('导入失败，请检查文件格式');}
  this.value='';
});

// close modal on backdrop click
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('delModal').addEventListener('click',function(e){if(e.target===this)closeDelModal();});


// ── batch selection ──

function updateBatchBar(){
  const bar=document.getElementById('batchBar');
  const cnt=document.getElementById('selCount');
  cnt.textContent=selIds.size;
  bar.classList.toggle('show',selIds.size>0);
  // sync header checkbox
  const allVisible=Array.from(document.querySelectorAll('.row-cb')).map(cb=>cb.dataset.id);
  const thCheck=document.getElementById('thCheck');
  if(thCheck&&allVisible.length>0){
    const allChecked=allVisible.every(id=>selIds.has(id));
    const someChecked=allVisible.some(id=>selIds.has(id));
    thCheck.checked=allChecked;
    thCheck.indeterminate=someChecked&&!allChecked;
  }
}

window.toggleRow=function(cb){
  const id=cb.dataset.id;
  if(cb.checked)selIds.add(id);else selIds.delete(id);
  const tr=cb.closest('tr');
  if(tr)tr.classList.toggle('row-checked',cb.checked);
  updateBatchBar();
};

window.toggleSelectAll=function(cb){
  document.querySelectorAll('.row-cb').forEach(box=>{
    box.checked=cb.checked;
    if(cb.checked)selIds.add(box.dataset.id);else selIds.delete(box.dataset.id);
    const tr=box.closest('tr');
    if(tr)tr.classList.toggle('row-checked',cb.checked);
  });
  // sync both checkboxes
  const thCheck=document.getElementById('thCheck');
  const selAll=document.getElementById('selectAll');
  if(thCheck)thCheck.checked=cb.checked;
  if(selAll)selAll.checked=cb.checked;
  updateBatchBar();
};

window.rowClick=function(e,id){
  if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
  const cb=document.querySelector(`.row-cb[data-id="${id}"]`);
  if(cb){cb.checked=!cb.checked;toggleRow(cb);}
};

window.clearSelection=function(){
  selIds.clear();
  clearTimeout(batchTimer);
  resetBatchBtn();
  document.querySelectorAll('.row-cb').forEach(cb=>{cb.checked=false;cb.closest('tr')?.classList.remove('row-checked');});
  const thCheck=document.getElementById('thCheck');
  const selAll=document.getElementById('selectAll');
  if(thCheck){thCheck.checked=false;thCheck.indeterminate=false;}
  if(selAll){selAll.checked=false;}
  updateBatchBar();
};

let batchStep=0,batchTimer=null;
window.batchDeleteStep=function(){
  if(selIds.size===0)return;
  if(batchStep===0){
    // first click: show confirm state
    batchStep=1;
    const btn=document.getElementById('batchDelBtn');
    const txt=document.getElementById('batchConfirmText');
    btn.textContent='确认删除';
    btn.style.background='#991B1B';
    txt.style.display='inline';
    // auto reset after 3s
    clearTimeout(batchTimer);
    batchTimer=setTimeout(()=>{resetBatchBtn();},3000);
  } else {
    // second click: actually delete
    clearTimeout(batchTimer);
    const n=selIds.size;
    records=records.filter(r=>!selIds.has(r.id));
    selIds.clear();
    save();render();
    resetBatchBtn();
    toast('已删除 '+n+' 条记录');
  }
};
function resetBatchBtn(){
  batchStep=0;
  const btn=document.getElementById('batchDelBtn');
  const txt=document.getElementById('batchConfirmText');
  if(btn){btn.textContent='删除所选';btn.style.background='';}
  if(txt)txt.style.display='none';
}

load();
</script>
